# A/B BASELINE for apfsds_vs_era.yaml — IDENTICAL geometry and areal mass, with
# the reactive filler swapped for its inert twin (era_filler_inert: same density,
# stiffness, and thickness, reactivity OFF). Nothing detonates; the sandwich is
# just three passive plates with a soft interlayer (a NERA-like bulge from the
# raw shock is all the filler does).
#
# The point of this deck is the CONTROL: comparing the rod's residual penetration
# into the main plate here vs. in apfsds_vs_era.yaml isolates the *reactive*
# contribution to penetrator degradation from the mass that is simply in the
# path. Because the only difference between the two decks is the filler's
# reactivity, the delta is the ERA effect, cleanly.
#
# Scenarios are DATA, not code (CLAUDE.md §9). Numbers are representative /
# illustrative order-of-magnitude values, not any real system (CLAUDE.md §10).
name: apfsds_vs_era_inert

domain: { xmin: 0, xmax: 200, ymin: 0, ymax: 100 }   # mm

projectile:
  kind: kinetic
  material: tungsten_rod
  length: 60.0        # mm
  diameter: 8.0       # mm
  velocity: 1600      # m/s (== mm/ms)
  angle_deg: 0.0

armor:
  - { material: rha,              thickness: 6.0 }                  # steel flyer plate
  - { material: era_filler_inert, thickness: 12.0 }                 # INERT interlayer
  - { material: rha,              thickness: 6.0 }                  # steel back plate
  - { material: rha,              thickness: 30.0, standoff: 25.0 } # main plate, 25 mm gap

solver:
  grid_resolution: 512
  particles_per_cell: 4
  dt: 1.0e-7          # substep dt (CFL-bound); NOT frame_dt
  total_time: 6.0e-5  # ~60 us — matches apfsds_vs_era (A/B decks must be
  #                     byte-identical in geometry AND timing to stay comparable).
  frame_count: 120
