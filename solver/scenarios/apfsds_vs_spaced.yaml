# APFSDS-like long-rod KE penetrator vs a SPACED steel array: a thin front plate,
# an air gap (standoff), then a thicker main plate behind it. This is the "spaced"
# multi-material demonstrator (milestone 4) — same proven KE parameters as
# apfsds_vs_rha, so the only new variable is the standoff gap between plates.
#
# Scenarios are DATA, not code (CLAUDE.md §9). Numbers are representative /
# illustrative order-of-magnitude values, not any real system (CLAUDE.md §10).
name: apfsds_vs_spaced

# The armor face sits mid-domain (x=150), so xmax buys room BEHIND the stack: the
# rod perforates and the residual has somewhere to fly. Slabs span the full height
# against slip (= mirror) walls, so the target reads as armor on a vehicle
# continuing past the frame, not a block floating in vacuum.
domain: { xmin: 0, xmax: 300, ymin: 0, ymax: 120 }   # mm

projectile:
  kind: kinetic
  material: tungsten_rod
  length: 60.0        # mm
  diameter: 8.0       # mm
  velocity: 1600      # m/s (== mm/ms)
  angle_deg: 0.0

armor:
  - { material: rha, thickness: 15.0 }                  # front plate
  - { material: rha, thickness: 30.0, standoff: 30.0 }  # main plate, 30 mm gap ahead

solver:
  grid_resolution: 768   # tracks the x-extent to hold dx ~= 0.39 mm
  particles_per_cell: 4
  dt: 1.0e-7          # substep dt (CFL-bound); NOT frame_dt
  # ~100 us. This deck was the worst-truncated of the set: at the old 40 us the
  # tip had only just REACHED the main plate (x=145.1 vs the plate's front face)
  # having done nothing to it, so the whole point of the standoff was off-camera.
  # The rod must now cross the front plate, the 30 mm gap, and the main plate.
  total_time: 1.0e-4
  frame_count: 500    # frame_dt = 2.0e-7 s, uniform across every deck
