# APFSDS-like long-rod KE penetrator vs a rolled-homogeneous-armor plate.
# Scenarios are DATA, not code (CLAUDE.md §9). Numbers are representative /
# illustrative order-of-magnitude values, not any real system (CLAUDE.md §10).
name: apfsds_vs_rha

# The armor face sits mid-domain, so xmax buys room BEHIND the plate: the rod
# perforates and the residual has somewhere to fly. Slabs span the full height
# and the walls are slip (= mirror) planes, so the plate reads as armor on a
# vehicle continuing past the frame, not a block floating in vacuum.
# grid_resolution tracks the x-extent to hold dx ~= 0.39 mm.
domain: { xmin: 0, xmax: 300, ymin: 0, ymax: 120 }   # mm

projectile:
  kind: kinetic
  material: tungsten_rod
  length: 60.0        # mm
  diameter: 8.0       # mm
  velocity: 1600      # m/s (== mm/ms)
  angle_deg: 0.0

armor:
  - { material: rha, thickness: 40.0 }   # mm

solver:
  grid_resolution: 768
  particles_per_cell: 4
  dt: 1.0e-7          # substep dt (CFL-bound); NOT frame_dt
  # ~80 us. At the old 40 us the tip was at x=136.5 with the back face at 140 —
  # the bake ended ~2 us BEFORE perforation, still doing 1495 m/s, so the whole
  # point of the deck was off-camera. 80 us carries the rod fully through the
  # plate and lets the residual fly clear.
  total_time: 8.0e-5
  # frame_dt = 2.0e-7 s, uniform across every deck (was 4.4e-7 here).
  frame_count: 400
