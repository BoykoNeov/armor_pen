# Shaped-charge (HEAT) jet vs a spaced composite stack (steel / ceramic / steel).
# Representative / illustrative only (CLAUDE.md §10).
#
# A real jet, not a rod stand-in (milestone 7). What makes this a jet rather than
# a fast rod is `tail_velocity`: the projectile is seeded VELOCITY-GRADED, 7000
# m/s at the tip falling linearly to 2000 m/s at the tail. Everything
# jet-characteristic then falls out of that one initial condition, with no new
# solver machinery:
#   * it STRETCHES, because each element flies at its own constant speed
#     (verified: the free-flight body elongates at the kinematic rate to within
#     0.0%, where the uniform control instead SHORTENS by erosion — PHYSICS §3.4);
#   * it erodes FLUID-LIKE, because at a 7 km/s stagnation point copper's yield is
#     ~1000x below the pressure, so von Mises caps deviatoric stress near zero
#     without any special "fluid" path.
#
# We seed an ALREADY-FORMED jet. The liner collapse and the explosive that drives
# it are deliberately NOT modelled — out of scope by construction (§10), and
# unnecessary, since the gradient is the part that matters downstream.
name: heat_vs_composite

# The armor face sits mid-domain (x=150), leaving room for the 120 mm jet body
# behind the tip AND for the residual to fly past the stack (which backs onto
# x=235). Slabs span the full height against slip (= mirror) walls, so the target
# reads as armor on a vehicle continuing past the frame.
domain: { xmin: 0, xmax: 300, ymin: 0, ymax: 120 }   # mm

projectile:
  kind: heat_jet
  material: copper_jet     # the classic liner metal; see materials.py
  length: 120.0            # mm (a jet is long and thin: L/D = 40)
  diameter: 3.0            # mm
  velocity: 7000           # m/s TIP velocity (== mm/ms)
  tail_velocity: 2000      # m/s at the tail -> a 5 mm/us stretch rate
  angle_deg: 0.0
  # A jet is a stretching column, not a pointed penetrator: it has no machined
  # nose to inherit. The tip shape is also irrelevant at this speed — PHYSICS
  # §1.2 measured final penetration as nose-shape-independent even at 1.6 km/s,
  # and this deck is 4x faster and deeper into the hydrodynamic regime.
  nose_shape: blunt

armor:
  - { material: rha,     thickness: 10.0 }                 # front plate
  - { material: ceramic, thickness: 25.0, standoff: 30.0 } # spaced ceramic
  - { material: rha,     thickness: 20.0 }                 # backing plate

solver:
  grid_resolution: 768   # tracks the x-extent to hold dx ~= 0.39 mm
  particles_per_cell: 4
  dt: 5.0e-8          # substep dt (CFL-bound); NOT frame_dt
  # ~30 us, sized to the jet's TIP passage (measured on this deck, not inherited
  # from the rod stand-in this replaced):
  #   t= 0.4 us  tip crosses the front face (x=150)
  #   t= 9.8 us  tip reaches the spaced ceramic (x=190)
  #   t=26.0 us  tip clears the back of the stack (x=235) — perforation
  #   t=30.0 us  end of window, tip at 245 mm, still 55 mm clear of the far wall
  # so nothing is pinned against the _g2p clamp (the "debris piled against an
  # invisible wall" artifact) and the whole perforation is in frame.
  #
  # EXTENDED from 25 us by milestone 8. The EOS made the penetration front slower
  # (it no longer under-resists at the stagnation point), and at 25 us the tip
  # reached only x=232 of the stack's 235 — the perforation this deck exists to
  # show fell OFF-CAMERA by 3 mm. Same failure `apfsds_vs_rha` had at 40 us, same
  # fix: move the window, not the physics. The figures above are re-measured
  # post-EOS; the pre-EOS timeline was 9.2 / 23.0 / 241.
  #
  # Note the penetration front advances at only ~3 mm/us, well under the 7 mm/us
  # seeded tip speed, and that is not a bug: the tip ERODES, so the leading
  # material is continuously consumed and replaced by material from further back —
  # which the velocity gradient makes slower. A graded jet decelerates its own
  # penetration front. This is why 30 us covers a passage that a 7 mm/us rod would
  # have finished far sooner.
  #
  # KNOWN LIMIT, and grading makes it structural rather than incidental: the jet
  # does NOT fully transit the stack in this window, and no sane domain lets it.
  # The tail flies at 2 km/s, so it needs ~100 us to cross to the armor — by which
  # time a 7 km/s tip would be ~850 mm downrange, far outside any affordable
  # field. A bounded domain can hold a graded jet's tip passage or its tail
  # transit, never both. This deck claims the TIP's passage, which is where the
  # penetration happens; the trailing body is honestly out of frame.
  total_time: 3.0e-5
  frame_count: 150    # frame_dt = 2.0e-7 s, uniform across every deck
