# Shaped-charge (HEAT) jet vs a spaced composite stack (steel / ceramic / steel).
# Representative / illustrative only (CLAUDE.md §10).
#
# STAND-IN: `material: tungsten_rod` is NOT a jet model — it is a long thin rod
# flown at jet-like speed. A real shaped-charge jet stretches, is velocity-graded
# tip-to-tail, and erodes fluid-dynamically; none of that is modelled here. This
# deck exists to keep the `heat_jet` path baked and playable, not to say anything
# about shaped-charge performance. The jet model is the open capability gap
# (milestone 7; SPH may return for fluid-like erosion — docs/PHYSICS.md §1).
name: heat_vs_composite

# The armor face sits mid-domain (x=150), leaving room for the 120 mm jet body
# behind the tip AND for the residual to fly past the stack (which backs onto
# x=235). Slabs span the full height against slip (= mirror) walls, so the target
# reads as armor on a vehicle continuing past the frame.
domain: { xmin: 0, xmax: 300, ymin: 0, ymax: 120 }   # mm

projectile:
  kind: heat_jet
  material: tungsten_rod   # jet stand-in until a proper jet model exists
  length: 120.0            # mm (a jet is long and thin)
  diameter: 3.0            # mm
  velocity: 7000           # m/s tip velocity (== mm/ms)
  angle_deg: 0.0

armor:
  - { material: rha,     thickness: 10.0 }                 # front plate
  - { material: ceramic, thickness: 25.0, standoff: 30.0 } # spaced ceramic
  - { material: rha,     thickness: 20.0 }                 # backing plate

solver:
  grid_resolution: 768   # tracks the x-extent to hold dx ~= 0.39 mm
  particles_per_cell: 4
  dt: 5.0e-8          # substep dt (CFL-bound); NOT frame_dt
  # ~25 us, and this window is set by the DOMAIN, not by the event.
  #
  # At 7 mm/us the tip crosses the stack (backs onto x=235) in ~17 us and then
  # eats the remaining 65 mm of domain in ~9 us. A 40 us window ran the tip into
  # the far wall at ~30 us, where the _g2p clamp pinned it for the last quarter of
  # the bake — the "debris piled against an invisible wall" artifact this pass
  # exists to remove. 25 us stops with the tip at ~272, ~28 mm clear of the clamp.
  #
  # KNOWN LIMIT: the 120 mm body does NOT fully transit the stack in this window,
  # and no sane domain lets it — a body that long at that speed outruns any
  # bounded field. This deck is a rod stand-in (see the header), so the tip's
  # passage is all it is claiming; a real jet model (milestone 7) re-sizes this
  # deck rather than papering over it here.
  total_time: 2.5e-5
  frame_count: 125    # frame_dt = 2.0e-7 s, uniform across every deck
