# APFSDS-like long-rod KE penetrator vs a NERA (non-explosive reactive armor)
# sandwich in front of a main plate: [thin steel plate | soft elastic interlayer |
# thin steel plate] :: gap :: main RHA plate.
#
# This deck exercises the **persistent-bulge branch** of the reactive layer
# (milestone 5), which until now was implemented but never baked. NERA carries no
# explosive: the impact shock alone drives the sandwich plates apart, and the
# cohesive elastic interlayer *holds the bulge open* instead of collapsing.
#
# GEOMETRY IS IDENTICAL to apfsds_vs_era.yaml / apfsds_vs_era_inert.yaml — same
# layers, thicknesses, standoff, rod, and timing — so all three are equal-areal-
# mass arms of one A/B family and differ ONLY in the filler's response path:
#
#   apfsds_vs_era        era_filler        reactive, ignites  -> detonation
#   apfsds_vs_era_inert  era_filler_inert  non-reactive       -> filler spalls away
#   apfsds_vs_nera       nera_filler       reactive, no ignite -> cohesive bulge
#
# The nera/era_inert pair is the interesting one: same inertia, same "no
# detonation", but the NERA filler stays cohesive (mpm.py skips the ductile-spall
# gate for reactive particles) where the inert filler shreds at its 0.02 damage
# threshold. Any delta between them is the *cohesion* of the interlayer, not mass.
#
# Scenarios are DATA, not code (CLAUDE.md §9). Numbers are representative /
# illustrative order-of-magnitude values, not any real system (CLAUDE.md §10).
name: apfsds_vs_nera

domain: { xmin: 0, xmax: 200, ymin: 0, ymax: 100 }   # mm

projectile:
  kind: kinetic
  material: tungsten_rod
  length: 60.0        # mm
  diameter: 8.0       # mm
  velocity: 1600      # m/s (== mm/ms)
  angle_deg: 0.0

armor:
  - { material: rha,         thickness: 6.0 }                  # steel front plate
  - { material: nera_filler, thickness: 12.0 }                 # soft elastic interlayer
  - { material: rha,         thickness: 6.0 }                  # steel back plate
  - { material: rha,         thickness: 30.0, standoff: 25.0 } # main plate, 25 mm gap

solver:
  grid_resolution: 512
  particles_per_cell: 4
  dt: 1.0e-7          # substep dt (CFL-bound); NOT frame_dt
  total_time: 6.0e-5  # ~60 us — matches the ERA decks so the A/B is frame-aligned
  frame_count: 120
