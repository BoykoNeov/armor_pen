# APFSDS-like long-rod KE penetrator vs a NERA (non-explosive reactive armor)
# sandwich in front of a main plate: [thin steel plate | soft elastic interlayer |
# thin steel plate] :: gap :: main RHA plate.
#
# This deck exercises the **persistent-bulge branch** of the reactive layer
# (milestone 5). NERA carries no explosive: the impact shock alone drives the
# sandwich plates apart, and the cohesive elastic interlayer *holds the bulge
# open* instead of collapsing.
#
# GEOMETRY IS IDENTICAL to apfsds_vs_era.yaml / apfsds_vs_era_inert.yaml — same
# domain, layers, thicknesses, standoff, rod, and timing — so all three are
# equal-areal-mass arms of one A/B family and differ ONLY in the filler's
# response path:
#
#   apfsds_vs_era        era_filler        reactive, ignites -> detonation
#   apfsds_vs_era_inert  era_filler_inert  ductile, dthr=0.02 -> filler shreds away
#   apfsds_vs_nera       nera_filler       ductile, dthr=3.0  -> cohesive bulge
#
# THE CONFOUND THIS HEADER USED TO CARRY IS FIXED (milestone 12). It read:
# "`reactive=True` makes mpm.py skip BOTH `_return_mapping` AND `_update_damage`
# for this filler, so nera_filler can neither yield nor break ... a genuine
# single-variable cohesion test would be a NON-reactive filler with a high
# damage_threshold." That prescription is now what the deck runs: nera_filler is
# non-reactive with damage_threshold=3.0, and it needed ZERO kernel code — both
# gates key off `reactive>0.5`. See materials.py and docs/PHYSICS.md §3.6.
#
# So the nera/era_inert A/B is now genuinely single-variable: the two materials
# agree on density, moduli, yield and reactivity and differ ONLY in
# damage_threshold (3.0 vs 0.02) — i.e. only in how much plastic strain the
# filler tolerates before it tears. `tests/test_nera_dissipation.py` pins that.
# MEASURED (110 us, this deck vs apfsds_vs_era_inert): filler spall 18.65 % vs
# 69.59 %, and 66.0 % vs 30.4 % of the filler still coherent in the slab — the
# cohesive arm is ~3.7x more intact than the shredding one, which is the claim.
#
# STILL NOT AN ARMOR-PERFORMANCE CLAIM. A cohesive filler resisting better than a
# shredding one remains close to tautological; what the A/B legitimately shows is
# the damage model (a spalled particle keeps mass and momentum but drops its
# stress term, so it stops resisting). Read PHYSICS §3.3 before quoting it.
#
# Scenarios are DATA, not code (CLAUDE.md §9). Numbers are representative /
# illustrative order-of-magnitude values, not any real system (CLAUDE.md §10).
name: apfsds_vs_nera

# MUST match apfsds_vs_era.yaml exactly — see that deck for the rationale.
domain: { xmin: 0, xmax: 300, ymin: 0, ymax: 120 }   # mm

projectile:
  kind: kinetic
  material: tungsten_rod
  length: 60.0        # mm
  diameter: 8.0       # mm
  velocity: 1600      # m/s (== mm/ms)
  angle_deg: 0.0

armor:
  - { material: rha,         thickness: 6.0 }                  # steel front plate
  - { material: nera_filler, thickness: 12.0 }                 # soft elastic interlayer
  - { material: rha,         thickness: 6.0 }                  # steel back plate
  - { material: rha,         thickness: 30.0, standoff: 25.0 } # main plate, 25 mm gap

solver:
  grid_resolution: 768   # tracks the x-extent to hold dx ~= 0.39 mm
  particles_per_cell: 4
  dt: 1.0e-7          # substep dt (CFL-bound); NOT frame_dt
  # Matches the ERA decks so the three-arm A/B stays frame-aligned.
  total_time: 1.1e-4
  frame_count: 550    # frame_dt = 2.0e-7 s, uniform across every deck
